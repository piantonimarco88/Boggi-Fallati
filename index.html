  const photoHeaders = Array.from({length: MAX_PHOTOS}, (_,i) => `Photo ${i+1}`);
  const headers = [
    t('colDate'), t('colStore'), t('fProv2'), t('fCust'), t('fCustEmail'),
    t('fCardLabel'), t('fPurchLabel'), t('fDropLabel'), t('fUsedLabel'),
    t('fWearLabel'), t('fArticleLabel'), t('fSizeLabel'), t('fDamageLabel'),
    t('fProposalLabel'), t('fNoteLabel'), t('colStatus'), t('panelHqReply'),
    t('panelApprove').charAt(0).toUpperCase()+t('panelApprove').slice(1).toLowerCase().split('/')[0].trim()+' by',
    t('colDate')+' decision', 'n. photos',
    t('pdfEmailCustomer'), t('pdfEmailStore'),
    t('pdfBtn'),
    ...photoHeaders
  ];

  const ws = XLSX.utils.aoa_to_sheet([headers]);

  data.forEach((r, rowIdx) => {
    const store = allAccounts.find(a => a.id === r.store_id);
    const photos = r.photo_urls || [];
    const baseRow = [
      r.date || '',
      store?.name || r.store_id,
      r.provenienza || '',
      r.customer_name || '',
      r.customer_email || '',
      r.card || '',
      r.purchase_date || '',
      r.dropoff_date || '',
      r.used === 'SI' ? t('usedYes') : (r.used === 'NO' ? t('usedNo') : ''),
      r.wear || '',
      r.article_code || '',
      r.size || '',
      r.damage_type || '',
      r.proposal || '',
      r.note || '',
      statusLabel(r.status),
      r.approval_note || '',
      r.decided_by || '',
      r.decided_at ? new Date(r.decided_at).toLocaleDateString('it-IT') : '',
      photos.length,
      r.email_cliente || '',
      r.email_negozio || '',
      '', // PDF link placeholder
    ];

    // Add photo values (as plain text first)
    for (let i = 0; i < MAX_PHOTOS; i++) {
      baseRow.push(photos[i] || '');
    }

    XLSX.utils.sheet_add_aoa(ws, [baseRow], {origin: rowIdx + 1});

    // PDF deep-link: clicking opens the app at this request
    const appUrl = window.location.href.split('?')[0];
    const pdfColIdx = headers.indexOf(t('pdfBtn'));
    const pdfCellAddr = XLSX.utils.encode_cell({r: rowIdx + 1, c: pdfColIdx});
    const deepLink = `${appUrl}?open=${r.id}`;
    ws[pdfCellAddr] = {
      v: `${t('pdfBtn')} →`,
      t: 's',
      l: { Target: deepLink, Tooltip: deepLink }
    };

    // Convert photo cells to hyperlinks
    photos.forEach((url, pIdx) => {
      if (!url) return;
      const colIdx = headers.length - MAX_PHOTOS + pIdx;
      const cellAddr = XLSX.utils.encode_cell({r: rowIdx + 1, c: colIdx});
      ws[cellAddr] = {
        v: `${t("fPhotos").replace(" *","")} ${pIdx + 1}`,
        t: 's',
        l: { Target: url, Tooltip: url }
      };
    });
  });

  // Column widths — added 3 new cols: email_cliente, email_negozio, pdf ref
  const colWidths = [10,22,12,20,24,16,12,12,10,8,16,8,24,10,30,12,30,18,14,8, 26,26,28, ...Array(MAX_PHOTOS).fill(14)];
  ws['!cols'] = colWidths.map(w => ({wch: w}));

  // Style header row bold (basic)
  ws['!rows'] = [{hpt: 16}]; // header row height

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Fallati');

  const region = isAdmin() ? 'all' : currentUser.region;
  const fname = `fallati_${region.toLowerCase()}_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb, fname);
  showToast(t('toastExportReady') + fname);
}

// ── PHOTOS ZIP EXPORT ──────────────────────────────────────
async function exportPhotosZip() {
  const btn = document.getElementById('zip-btn');
  if (btn) { btn.disabled = true; btn.textContent = '...'; }

  showToast(t('toastZipPrep'), 60000);

  const data = await fetchRequests(null);
  // Collect all requests that have photos
  const withPhotos = data.filter(r => r.photo_urls && r.photo_urls.length > 0);

  if (!withPhotos.length) {
    showToast(t('toastZipEmpty'));
    if (btn) { btn.disabled = false; btn.textContent = t('downloadZip'); }
    return;
  }

  const zip = new JSZip();

  // Group by article_code — sanitize folder name
  const sanitize = str => (str || 'senza_codice').replace(/[^a-zA-Z0-9_\-\.]/g, '_').slice(0, 40);

  let totalPhotos = 0;
  let failedPhotos = 0;

  // Process each request
  for (const r of withPhotos) {
    const folderName = sanitize(r.article_code);
    // Sub-folder: articleCode / requestId_date
    const subFolder = `${folderName}/${sanitize(r.date)}_${r.id.slice(0,6)}`;
    const folder = zip.folder(subFolder);

    // Add a small metadata txt file per request
    const store = allAccounts.find(a => a.id === r.store_id);
    const meta = [
      `${t('fArticleLabel')}: ${r.article_code}`,
      `${t('fStore')}: ${store?.name || r.store_id}`,
      `${t('colDate')}: ${r.date}`,
      `${t('fDamageLabel')}: ${r.damage_type || '—'}`,
      `${t('fProposalLabel')}: ${r.proposal || '—'}`,
      `${t('fCust')}: ${r.customer_name || '—'}`,
      `${t('colStatus')}: ${statusLabel(r.status)}`,
      r.approval_note ? `${t('panelHqReply')}: ${r.approval_note}` : '',
    ].filter(Boolean).join('\n');
    folder.file('info.txt', meta);

    // Download each photo
    for (let i = 0; i < r.photo_urls.length; i++) {
      const url = r.photo_urls[i];
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const blob = await response.blob();
        const ext = url.split('?')[0].split('.').pop().toLowerCase() || 'jpg';
        folder.file(`foto_${i + 1}.${ext}`, blob);
        totalPhotos++;
      } catch (e) {
        failedPhotos++;
      }
    }
  }

  if (totalPhotos === 0) {
    showToast(t('toastZipEmpty'));
    if (btn) { btn.disabled = false; btn.textContent = t('downloadZip'); }
    return;
  }

  // Generate zip
  const zipBlob = await zip.generateAsync({
    type: 'blob',
    compression: 'DEFLATE',
    compressionOptions: { level: 6 },
    streamFiles: true
  }, metadata => {
    // Update button with progress
    if (btn) btn.textContent = `${Math.round(metadata.percent)}%`;
  });

  const region = isAdmin() ? 'all' : currentUser.region.toLowerCase();
  const fname = `fallati_foto_${region}_${new Date().toISOString().slice(0,10)}.zip`;

  // Trigger download
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zipBlob);
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); document.body.removeChild(a); }, 2000);

  const msg = `${t('toastZipDone')}${fname}${failedPhotos > 0 ? ` (${failedPhotos} foto non scaricate)` : ''}`;
  showToast(msg, 5000);
  if (btn) { btn.disabled = false; btn.textContent = t('downloadZip'); }
}

// ── STORE REGISTRY ─────────────────────────────────────────
async function renderRegistry() {
  const tc = document.getElementById('tab-content');
  if (!tc) return;
  const { data: stores, error } = await sb.from('accounts').select('*').eq('role','store').order('id');
  if (error) { tc.innerHTML = `<div class="empty">${t('errLoad')}${error.message}</div>`; return; }

  const rows = (stores||[]).map(s => `
    <tr>
      <td style="font-family:var(--mono);font-size:12px;white-space:nowrap">${s.id}</td>
      <td style="font-weight:500">${s.name}</td>
      <td><span class="badge" style="background:var(--bg2);color:var(--tx2)">${s.region}</span></td>
      <td><span class="badge ${s.active?'b-approved':'b-rejected'}">${s.active?t('regActive'):'—'}</span></td>
      <td style="white-space:nowrap">
        <button class="btn" style="font-size:11px;padding:4px 10px;margin-right:4px" onclick="openStoreForm('${s.id}')">${t('regEditStore')}</button>
        <button class="btn btn-reject" style="font-size:11px;padding:4px 8px" onclick="deleteStore('${s.id}','${s.name.replace(/'/g,'')}')">${t('regDeleteStore')}</button>
      </td>
    </tr>`).join('');

  tc.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn btn-primary" onclick="openStoreForm(null)">+ ${t('regAddStore')}</button>
    </div>
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th style="width:90px">${t('regStoreId')}</th>
            <th>${t('regStoreName')}</th>
            <th style="width:70px">${t('regRegion')}</th>
            <th style="width:80px">${t('regActive')}</th>
            <th style="width:180px"></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    <div id="store-form-area" style="margin-top:20px"></div>`;
}

async function openStoreForm(storeId) {
  const isNew = !storeId;
  let store = {id:'',name:'',region:'ITA',email:'',password:'',active:true};
  if (!isNew) {
    const { data } = await sb.from('accounts').select('*').eq('id', storeId).single();
    if (data) store = data;
  }

  const formArea = document.getElementById('store-form-area');
  if (!formArea) return;
  formArea.innerHTML = `
    <div class="form-card" style="max-width:560px;border-color:var(--br2)">
      <div style="font-weight:500;font-size:14px;margin-bottom:16px">${isNew ? '+ '+t('regAddStore') : t('regEditStore')}: ${store.name||''}</div>
      <div class="form-grid">
        <div class="ff"><label>${t('regStoreId')} *</label>
          <input id="reg-id" type="text" value="${store.id}" ${isNew?'':'readonly style="opacity:.6"'} placeholder="1001" maxlength="20"></div>
        <div class="ff"><label>${t('regStoreName')} *</label>
          <input id="reg-name" type="text" value="${store.name}" placeholder="1001 Milano San Babila"></div>
        <div class="ff"><label>${t('regRegion')} *</label>
          <select id="reg-region">
            <option value="ITA" ${store.region==='ITA'?'selected':''}>ITA</option>
            <option value="INT" ${store.region==='INT'?'selected':''}>INT</option>
          </select></div>
        <div class="ff"><label>${t('regPassword')} ${isNew?'*':''}</label>
          <input id="reg-pwd" type="text" value="${store.password||''}" placeholder="${isNew?'store1001':'lascia vuoto per non cambiare'}"></div>
        <div class="ff"><label>${t('regActive')}</label>
          <select id="reg-active">
            <option value="true" ${store.active?'selected':''}>✓ ${t('regActive')}</option>
            <option value="false" ${!store.active?'selected':''}>✗ Disattivo</option>
          </select></div>
      </div>
      <div id="reg-err" style="color:var(--red-tx);font-size:12px;margin-top:10px;display:none"></div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" onclick="saveStore(${isNew},'${store.id}')">${t('regSave')}</button>
        <button class="btn" onclick="document.getElementById('store-form-area').innerHTML=''">${t('regCancel')}</button>
      </div>
    </div>`;
  formArea.scrollIntoView({behavior:'smooth',block:'start'});
}

async function saveStore(isNew, oldId) {
  const id = document.getElementById('reg-id')?.value?.trim();
  const name = document.getElementById('reg-name')?.value?.trim();
  const region = document.getElementById('reg-region')?.value;
  const pwd = document.getElementById('reg-pwd')?.value?.trim();
  const active = document.getElementById('reg-active')?.value === 'true';
  const errEl = document.getElementById('reg-err');

  const showErr = (msg) => { if(errEl){errEl.textContent=msg;errEl.style.display='block';} };

  if (!id) return showErr(t('regErrId'));
  if (!name) return showErr(t('regErrName'));
  if (isNew && !pwd) return showErr(t('regErrPwd'));

  if (isNew) {
    const { data: existing } = await sb.from('accounts').select('id').eq('id',id).single();
    if (existing) return showErr(t('regErrIdExists'));
    const { error } = await sb.from('accounts').insert({
      id, name, role:'store', region, email: '', password: pwd, active
    });
    if (error) return showErr(t('errSend')+error.message);
  } else {
    const updates = { name, region, active };
    if (pwd) updates.password = pwd;
    const { error } = await sb.from('accounts').update(updates).eq('id', oldId || id);
    if (error) return showErr(t('errSend')+error.message);
  }

  // Refresh local accounts list
  const { data: updated } = await sb.from('accounts').select('*').eq('active', true);
  allAccounts = updated || allAccounts;

  showToast(t('regSaved'));
  await renderRegistry();
}

async function deleteStore(id, name) {
  if (!confirm(`${t('regConfirmDelete')}\n\n${name} (${id})`)) return;
  const { error } = await sb.from('accounts').delete().eq('id', id);
  if (error) { showToast(t('errSend')+error.message); return; }
  const { data: updated } = await sb.from('accounts').select('*').eq('active', true);
  allAccounts = updated || allAccounts;
  showToast(t('regDeleted'));
  await renderRegistry();
}

// ── DEEP LINK HANDLER (from Excel PDF column) ──────────────
async function handleDeepLink() {
  const params = new URLSearchParams(window.location.search);
  const openId = params.get('open');
  if (!openId || !currentUser) return;
  // Small delay to let the app finish rendering
  await new Promise(r => setTimeout(r, 400));
  setTab('all');
  await new Promise(r => setTimeout(r, 300));
  openPanel(openId);
}

// ── INIT ───────────────────────────────────────────────────
async function init() {
  const { data, error } = await sb.from('accounts').select('*').eq('active', true);
  if (error) {
    document.getElementById('root').innerHTML = `<div style="padding:40px;text-align:center;color:red">${t('errConn')}${error.message}</div>`;
    return;
  }
  allAccounts = data || [];
  render();
}

init();
</script>
