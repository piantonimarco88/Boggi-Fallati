<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Fallati – Boggi Milano</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --tx:#1a1a18;--tx2:#6b6b67;--tx3:#9b9b96;
  --br:rgba(0,0,0,0.10);--br2:rgba(0,0,0,0.18);
  --green-bg:#eaf3de;--green-tx:#27500a;--green-br:#97c459;
  --red-bg:#fcebeb;--red-tx:#791f1f;--red-br:#f09595;
  --amber-bg:#faeeda;--amber-tx:#854f0b;--amber-br:#ef9f27;
  --blue-bg:#e6f1fb;--blue-tx:#0c447c;--blue-br:#85b7eb;
  --r:8px;--rl:12px;
  --font:'Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Fira Mono',monospace;
}
body{font-family:var(--font);font-size:14px;color:var(--tx);background:var(--bg3)}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;background:var(--bg);border-right:0.5px solid var(--br);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:18px 16px 14px;border-bottom:0.5px solid var(--br)}
.logo-title{font-size:15px;font-weight:500}
.logo-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-item{padding:9px 16px;cursor:pointer;font-size:13px;color:var(--tx2);display:flex;align-items:center;gap:8px;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.nav-item.active{background:var(--bg2);color:var(--tx);font-weight:500}
.nav-item:hover:not(.active){background:var(--bg2)}
.nav-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.35;flex-shrink:0}
.nav-dot.warn{background:#BA7517;opacity:1}
.nav-badge{margin-left:auto;background:var(--amber-bg);color:var(--amber-tx);font-size:11px;padding:1px 7px;border-radius:10px;font-weight:500}
.user-area{padding:12px 16px;border-top:0.5px solid var(--br)}
.user-role{font-size:11px;color:var(--tx2)}
.user-name{font-size:13px;font-weight:500;margin-top:2px}
.btn-logout{margin-top:8px;font-size:11px;color:var(--tx2);cursor:pointer;background:none;border:none;padding:0;font-family:var(--font);text-decoration:underline}
.btn-logout-full{margin-top:10px;width:100%;font-size:12px;color:var(--tx2);cursor:pointer;background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--r);padding:7px 10px;font-family:var(--font);text-align:center;display:block}
.btn-logout-full:hover{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-br)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--br);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0}
.topbar-title{font-weight:500;font-size:15px}
.content{flex:1;overflow-y:auto;padding:20px}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:var(--r);border:0.5px solid var(--br2);background:var(--bg);color:var(--tx);cursor:pointer;font-size:13px;font-family:var(--font)}
.btn:hover{background:var(--bg2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.btn-primary:hover{opacity:.85}
.btn-approve{background:var(--green-bg);color:var(--green-tx);border-color:var(--green-br)}
.btn-approve:hover{opacity:.85}
.btn-reject{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-br)}
.btn-reject:hover{opacity:.85}
.btn-suspend{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue-br)}
.btn-suspend:hover{opacity:.85}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--bg2);border-radius:var(--r);padding:14px}
.metric-label{font-size:11px;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.metric-value{font-size:22px;font-weight:500}

/* TABLE */
.table-wrap{background:var(--bg);border:0.5px solid var(--br);border-radius:var(--rl);overflow:hidden}
.table-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--br);gap:8px;flex-wrap:wrap}
.filter-sel{font-size:12px;padding:5px 8px;border:0.5px solid var(--br2);border-radius:var(--r);background:var(--bg2);color:var(--tx);font-family:var(--font)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;border-bottom:0.5px solid var(--br);background:var(--bg2);white-space:nowrap}
td{padding:10px 14px;border-bottom:0.5px solid var(--br);vertical-align:middle;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr.clickable:hover td{background:var(--bg2);cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.b-pending{background:var(--amber-bg);color:var(--amber-tx)}
.b-approved{background:var(--green-bg);color:var(--green-tx)}
.b-rejected{background:var(--red-bg);color:var(--red-tx)}
.b-suspended{background:var(--blue-bg);color:var(--blue-tx)}

/* PANEL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100}
.overlay.open{display:flex;justify-content:flex-end}
.panel{width:480px;max-width:100vw;height:100%;background:var(--bg);display:flex;flex-direction:column;border-left:0.5px solid var(--br)}
.panel-hdr{padding:16px 20px;border-bottom:0.5px solid var(--br);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.panel-body{flex:1;overflow-y:auto;padding:20px}
.panel-foot{padding:14px 20px;border-top:0.5px solid var(--br);display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.close-x{background:none;border:none;cursor:pointer;font-size:22px;color:var(--tx2);line-height:1;padding:0 4px;flex-shrink:0}
.fg{margin-bottom:14px}
.fl{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.fv{font-size:13px;line-height:1.5}
.divider{height:0.5px;background:var(--br);margin:14px 0}
.note-ta{width:100%;font-family:var(--font);font-size:13px;padding:9px;border:0.5px solid var(--br2);border-radius:var(--r);background:var(--bg2);color:var(--tx);resize:none;min-height:68px}
.note-ta:focus{outline:none;border-color:var(--br2)}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.photo-thumb{aspect-ratio:1;border-radius:var(--r);border:0.5px solid var(--br);overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--tx2)}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg3)}
.login-card{background:var(--bg);border:0.5px solid var(--br);border-radius:var(--rl);padding:32px;width:380px;max-width:calc(100vw - 32px)}
.login-title{font-size:18px;font-weight:500;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--tx2);margin-bottom:24px}
.acc-btn{width:100%;text-align:left;padding:11px 14px;border-radius:var(--r);border:0.5px solid var(--br2);background:var(--bg);cursor:pointer;font-family:var(--font);margin-bottom:6px;display:block}
.acc-btn:hover{background:var(--bg2)}
.acc-btn.sede{border-color:var(--blue-br);background:var(--blue-bg)}
.acc-btn.sede:hover{opacity:.85}
.acc-name{font-size:14px;font-weight:500;color:var(--tx)}
.acc-btn.sede .acc-name{color:var(--blue-tx)}
.acc-role{font-size:11px;color:var(--tx2);margin-top:2px}
.acc-btn.sede .acc-role{color:var(--blue-tx);opacity:.8}
.sep{font-size:11px;color:var(--tx2);text-align:center;margin:10px 0 8px}
.stores-list{max-height:260px;overflow-y:auto;padding-right:2px}
.pw-row{margin-top:10px;display:flex;gap:8px;align-items:center}
.pw-input{flex:1;font-family:var(--font);font-size:13px;padding:8px 10px;border:0.5px solid var(--br2);border-radius:var(--r);background:var(--bg2);color:var(--tx)}
.pw-input:focus{outline:none}
.pw-err{color:var(--red-tx);font-size:12px;margin-top:6px}

/* FORM */
.form-card{background:var(--bg);border:0.5px solid var(--br);border-radius:var(--rl);padding:24px;max-width:660px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ff{display:flex;flex-direction:column;gap:4px}
.ff.full{grid-column:1/-1}
.ff label{font-size:12px;color:var(--tx2);font-weight:500}
.ff input,.ff select,.ff textarea{font-family:var(--font);font-size:13px;padding:8px 10px;border:0.5px solid var(--br2);border-radius:var(--r);background:var(--bg2);color:var(--tx)}
.ff textarea{resize:none;height:66px}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:#888}
.upload-area{border:1px dashed var(--br2);border-radius:var(--r);padding:16px;text-align:center;color:var(--tx2);font-size:12px;cursor:pointer;position:relative}
.upload-area:hover{background:var(--bg2)}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-preview{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.photo-preview-item{aspect-ratio:1;border-radius:var(--r);overflow:hidden;border:0.5px solid var(--br);position:relative}
.photo-preview-item img{width:100%;height:100%;object-fit:cover}
.photo-preview-item .rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}

/* NOTIFICATION BANNER */
.notif-banner{background:var(--amber-bg);border:0.5px solid var(--amber-br);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.notif-close{margin-left:auto;background:none;border:none;cursor:pointer;font-size:18px;color:var(--amber-tx);padding:0 4px;flex-shrink:0}

/* UTILS */
.empty{text-align:center;padding:40px;color:var(--tx2);font-size:13px}
.loading{text-align:center;padding:40px;color:var(--tx2);font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.field-note{background:var(--bg2);padding:10px;border-radius:var(--r);font-size:13px;line-height:1.5;color:var(--tx)}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg);border:0.5px solid var(--br);border-radius:var(--rl);padding:16px}
.stat-card-title{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;font-weight:500}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-label{font-size:12px;color:var(--tx);min-width:0;flex:0 0 auto;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bar-val{font-size:11px;color:var(--tx2);min-width:32px;text-align:right}
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut-legend{flex:1;min-width:0}
.legend-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kpi-card{background:var(--bg2);border-radius:var(--r);padding:14px}
.kpi-label{font-size:11px;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.kpi-value{font-size:24px;font-weight:500}
.kpi-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.stats-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.btn-excel{background:var(--green-bg);color:var(--green-tx);border-color:var(--green-br);padding:7px 14px;border-radius:var(--r);border:0.5px solid;cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500}
.btn-excel:hover{opacity:.85}
.btn-zip{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue-br);padding:7px 14px;border-radius:var(--r);border:0.5px solid;cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500}
.btn-zip:hover{opacity:.85}
.btn-zip:disabled{opacity:.5;cursor:not-allowed}

/* TABLE COLUMN FILTERS */
.th-filter{display:flex;flex-direction:column;gap:3px;cursor:default}
.th-label{display:flex;align-items:center;gap:4px;white-space:nowrap}
.th-sort{font-size:9px;opacity:.5;cursor:pointer;user-select:none}
.th-sort:hover{opacity:1}
.col-filter{font-size:11px;padding:3px 6px;border:0.5px solid var(--br2);border-radius:4px;background:var(--bg);color:var(--tx);font-family:var(--font);width:100%;margin-top:2px}
.col-filter:focus{outline:none;border-color:var(--br2)}
.filter-active{border-color:#378ADD !important;background:var(--blue-bg) !important}
.filter-clear-btn{font-size:10px;color:var(--tx2);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;margin-top:2px;font-family:var(--font)}
.filter-count{font-size:11px;color:var(--tx2);margin-left:auto}
/* LANGUAGE SELECTOR */
.lang-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;justify-content:center}
.lang-btn{padding:5px 10px;border-radius:20px;border:0.5px solid var(--br2);background:var(--bg);cursor:pointer;font-size:12px;font-family:var(--font);color:var(--tx2)}
.lang-btn:hover{background:var(--bg2)}
.lang-btn.active{background:var(--tx);color:var(--bg);border-color:var(--tx)}
/* MOBILE BOTTOM NAV */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--br);z-index:90;padding:0 0 env(safe-area-inset-bottom,0)}
.mobile-nav-inner{display:flex;align-items:stretch}
.mob-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 6px;border:none;background:none;cursor:pointer;font-family:var(--font);font-size:9px;color:var(--tx2);gap:2px;border-top:2px solid transparent;min-height:52px}
.mob-nav-btn.active{color:var(--tx);border-top-color:var(--tx)}
.mob-nav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.mob-nav-badge{background:var(--amber-bg);color:var(--amber-tx);font-size:10px;padding:1px 5px;border-radius:8px;font-weight:500;line-height:1.4}
/* MANUAL LAYOUT */
.man-layout{display:flex;height:100%;overflow:hidden}
.man-sidebar{width:240px;flex-shrink:0;background:var(--bg);border-right:0.5px solid var(--br);overflow-y:auto;display:flex;flex-direction:column}
.man-lang-sel{padding:14px 14px 10px;border-bottom:0.5px solid var(--br)}
.man-lang-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--br2);background:var(--bg2);cursor:pointer;font-family:var(--font);color:var(--tx2);transition:all .15s}
.man-lang-btn.active{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.man-toc{padding:10px 8px;flex:1}
.man-toc-item{width:100%;display:flex;align-items:center;gap:8px;padding:7px 8px;border:none;background:none;cursor:pointer;font-family:var(--font);font-size:12px;color:var(--tx2);border-radius:6px;text-align:left;line-height:1.3;transition:background .1s}
.man-toc-item:hover{background:var(--bg2)}
.man-toc-item.active{background:var(--bg3);color:var(--tx);font-weight:500}
.man-toc-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center}
.man-content{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg)}
.man-content h2{font-size:20px;font-weight:500;margin-bottom:16px;padding-bottom:10px;border-bottom:0.5px solid var(--br);color:var(--tx)}
.man-content h3{font-size:14px;font-weight:500;margin:18px 0 10px;color:var(--tx)}
.man-content p{font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:10px}
.man-content ul{padding-left:18px;margin-bottom:10px}
.man-content li{font-size:13px;color:var(--tx2);line-height:1.7}
.man-table-wrap{overflow-x:auto;margin-bottom:16px;border-radius:var(--r);border:0.5px solid var(--br)}
.man-table{width:100%;border-collapse:collapse;font-size:12.5px}
.man-table th{background:var(--bg3);font-weight:500;color:var(--tx);padding:9px 12px;text-align:left;border-bottom:0.5px solid var(--br);white-space:nowrap}
.man-table td{padding:9px 12px;color:var(--tx2);line-height:1.5;border-bottom:0.5px solid var(--br);vertical-align:top}
.man-table tr:last-child td{border-bottom:none}
.man-table tr:hover td{background:var(--bg2)}
.cls-ok{background:var(--green-bg);color:var(--green-tx);font-weight:500;text-align:center}
.cls-ff{background:var(--amber-bg);color:var(--amber-tx);font-weight:500;text-align:center}
.cls-fl{background:#fde8e8;color:#7c2a2a;font-weight:500;text-align:center}
.cls-fb{background:#f0e4f4;color:#6b2a8a;font-weight:500;text-align:center}
.man-matrix{margin-bottom:16px}
.man-matrix .man-table th:first-child{width:180px}
.man-box{background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;font-size:13px;color:var(--tx2);line-height:1.65}
.man-box strong{color:var(--tx)}
.man-box ul{padding-left:16px;margin-top:6px}
.man-warn{border-color:var(--amber-br);background:var(--amber-bg);color:var(--amber-tx)}
.man-tip{background:var(--blue-bg);border:0.5px solid var(--blue-br);border-radius:var(--r);padding:10px 14px;font-size:12.5px;color:var(--blue-tx);margin-top:14px;line-height:1.55}
.man-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.man-step{display:flex;gap:12px;align-items:flex-start;font-size:13px;color:var(--tx2);line-height:1.55}
.man-step-num{width:26px;height:26px;border-radius:50%;background:var(--tx);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px}
.man-two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.man-card{background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--r);padding:14px 16px}
.man-card h3{font-size:13px;font-weight:500;margin-bottom:8px;margin-top:0}
.man-card p,.man-card li{font-size:12.5px;color:var(--tx2);line-height:1.6}
.man-card ul{padding-left:16px;margin-top:6px}
.man-categories{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.man-cat{background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--r);padding:12px 14px;font-size:12.5px;color:var(--tx2)}
.man-classify{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.man-cls-item{display:flex;align-items:center;gap:10px;flex:1;min-width:180px;background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--r);padding:12px 14px;font-size:12.5px;color:var(--tx2);line-height:1.45}
.man-cls-item.ff{background:var(--amber-bg);border-color:var(--amber-br)}
.man-cls-item.fl{background:#fde8e8;border-color:#e08888}
.man-cls-item.fb{background:#f0e4f4;border-color:#c084d4}
.man-cls-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-size:11px;font-weight:700;flex-shrink:0;color:#fff}
.man-cls-badge.ff,.man-cls-item.ff .man-cls-badge,.cls-ff .man-cls-badge{background:var(--amber-tx)}
.man-cls-item.ff .man-cls-badge{background:var(--amber-tx)}
.man-cls-item.fl .man-cls-badge{background:#7c2a2a}
.man-cls-item.fb .man-cls-badge{background:#6b2a8a}
.man-cls-badge{background:var(--tx)}
.man-symbols{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:14px}
.man-sym-group{background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--r);padding:12px 14px}
.man-sym-group h4{font-size:12px;font-weight:500;margin-bottom:8px;color:var(--tx)}
.man-sym-row{display:flex;gap:10px;align-items:center;padding:4px 0;font-size:12px;color:var(--tx2);border-bottom:0.5px solid var(--br)}
.man-sym-row:last-child{border-bottom:none}
.man-sym-icon{min-width:60px;font-family:var(--mono);font-size:11px;color:var(--tx);background:var(--bg);border:0.5px solid var(--br);border-radius:4px;padding:2px 6px;text-align:center}
/* MOBILE MANUAL */
@media(max-width:700px){
  .man-layout{position:relative;overflow:hidden}
  .man-sidebar{position:absolute;top:0;left:-100%;width:240px;height:100%;z-index:10;transition:left .2s ease;box-shadow:none}
  .man-sidebar.man-sidebar-open{left:0;box-shadow:4px 0 16px rgba(0,0,0,.12)}
  .man-content{padding:16px;width:100%}
  .man-mob-toc-btn{display:flex!important}
  .man-two-col{grid-template-columns:1fr}
  .man-categories{grid-template-columns:1fr 1fr}
  .man-symbols{grid-template-columns:1fr}
  .man-classify{flex-direction:column}
}
.man-mob-toc-btn{display:none;align-items:center;gap:6px;padding:7px 12px;border:0.5px solid var(--br2);border-radius:var(--r);background:var(--bg);font-size:12px;cursor:pointer;font-family:var(--font);color:var(--tx2);margin-bottom:14px}
@media(max-width:600px){
  .man-mob-toc-btn{display:flex!important}
  .man-layout{padding-bottom:80px}
}
/* END MANUAL */
.thread-wrap{display:flex;flex-direction:column;gap:8px;margin-top:8px;max-height:260px;overflow-y:auto;padding-right:2px}
.msg-bubble{max-width:85%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.45}
.msg-bubble.me{align-self:flex-end;background:var(--tx);color:var(--bg);border-bottom-right-radius:4px}
.msg-bubble.other{align-self:flex-start;background:var(--bg2);color:var(--tx);border-bottom-left-radius:4px}
.msg-meta{font-size:10px;opacity:.6;margin-top:3px}
.msg-photos{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.msg-photos a{display:block;width:60px;height:60px;border-radius:6px;overflow:hidden;flex-shrink:0}
.msg-photos img{width:100%;height:100%;object-fit:cover;display:block}
.thread-input-row{display:flex;gap:6px;align-items:flex-end;margin-top:8px;border-top:0.5px solid var(--br);padding-top:10px}
.thread-ta{flex:1;font-family:var(--font);font-size:13px;padding:8px 10px;border:0.5px solid var(--br2);border-radius:var(--r);background:var(--bg2);color:var(--tx);resize:none;min-height:38px;max-height:100px}
.thread-ta:focus{outline:none;border-color:var(--br2)}
.thread-photo-btn{padding:7px 9px;border-radius:var(--r);border:0.5px solid var(--br2);background:var(--bg);cursor:pointer;font-size:11px;color:var(--tx2);white-space:nowrap;position:relative;font-family:var(--font)}
.thread-photo-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.thread-photo-preview{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.thread-photo-thumb{width:48px;height:48px;border-radius:5px;overflow:hidden;position:relative;border:0.5px solid var(--br)}
.thread-photo-thumb img{width:100%;height:100%;object-fit:cover}
.thread-photo-thumb .rm{position:absolute;top:1px;right:1px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:15px;height:15px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
@media(max-width:600px){
  .sidebar{display:none}
  .mobile-nav{display:block}
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
  .panel{width:100vw}
  .form-grid{grid-template-columns:1fr}
  .ff.full{grid-column:1}
  .content{padding:14px;padding-bottom:80px}
  .topbar{padding:0 14px}
  .stats-2col{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,minmax(0,1fr))}
  table{font-size:12px}
  td,th{padding:8px 10px}
}

// detect browser language
function detectLang() {
  const saved = localStorage.getItem('fallati_lang');
  if (saved && TRANSLATIONS[saved]) return saved;
  const bl = (navigator.language || 'it').slice(0,2).toLowerCase();
  return TRANSLATIONS[bl] ? bl : 'it';
}
let currentLang = detectLang();
function t(k) { return (TRANSLATIONS[currentLang] || TRANSLATIONS.it)[k] || TRANSLATIONS.it[k] || k; }
function setLang(l) {
  currentLang = l;
  localStorage.setItem('fallati_lang', l);
  render();
}

// Dynamic arrays using t()
function getDamageTypes() { return DAMAGE_TYPES_KEYS.map(k => t(k)); }
function getProvenienzaTypes() { return PROVENIENZA_KEYS.map(k => t(k)); }
function getProvenienzaKey(label) {
  const idx = getProvenienzaTypes().indexOf(label);
  return idx >= 0 ? PROVENIENZA_KEYS[idx] : label;
}
function getDamageKey(label) {
  const idx = getDamageTypes().indexOf(label);
  return idx >= 0 ? DAMAGE_TYPES_KEYS[idx] : label;
}

let allAccounts = [];
let currentTab = 'pending';
let pendingLogin = null;
let uploadedFiles = [];

// ── UTILS ──────────────────────────────────────────────────
function today() { return new Date().toLocaleDateString(currentLang+'-'+currentLang.toUpperCase()); }
function showToast(msg, duration = 3000) {
  const t2 = document.getElementById('toast');
  t2.textContent = msg; t2.classList.add('show');
  setTimeout(() => t2.classList.remove('show'), duration);
}
function genId() {
  return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
}
function statusLabel(s) {
  return {pending:t('statusPending'),approved:t('statusApproved'),rejected:t('statusRejected'),suspended:t('statusSuspended')}[s] || s;
}
function statusClass(s) {
  return {pending:'b-pending',approved:'b-approved',rejected:'b-rejected',suspended:'b-suspended'}[s] || '';
}

// ── ROLE HELPERS ───────────────────────────────────────────
function isAdmin() { return currentUser?.role === 'admin'; }
function isSede()  { return currentUser?.role === 'sede' || isAdmin(); }
function isStore() { return currentUser?.role === 'store'; }
// Admin sees all regions; sede sees its own region
function userRegions() {
  if (isAdmin()) return ['ITA','INT'];
  return [currentUser.region];
}

// ── RENDER ROOT ────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  if (!currentUser) { root.innerHTML = renderLogin(); return; }
  root.innerHTML = renderApp();
  loadTab(currentTab);
}

      <div class="acc-name">${t('hqItaName')}</div><div class="acc-role">${t('hqItaRole')}</div>

      <div class="acc-name">${t('hqIntName')}</div><div class="acc-role">${t('hqIntRole')}</div>

      style="width:100%;margin-bottom:8px"

function renderStoreItems(stores, query) {
  const q = query.trim().toLowerCase();
  const filtered = q
    ? stores.filter(s => s.name.toLowerCase().includes(q) || s.id.includes(q))
    : stores;
  if (!filtered.length) {
    return `<div style="padding:12px;text-align:center;font-size:13px;color:var(--tx2)">—</div>`;
  }
  return filtered.map(s => `
    <button class="acc-btn" onclick="selectAccount('${s.id}')">
      <div class="acc-name">${s.name}</div>
      <div class="acc-role">${s.id} · ${s.region}</div>
    </button>`).join('');
}

function filterStoresList(query) {
  const list = document.getElementById('stores-list');
  if (!list) return;
  const stores = allAccounts.filter(a => a.role === 'store');
  list.innerHTML = renderStoreItems(stores, query);
}

function selectAccount(id) {
  pendingLogin = id;
  const pwArea = document.getElementById('pw-area');
  if (pwArea) { pwArea.style.display = 'block'; document.getElementById('pw-input').focus(); }
  document.getElementById('pw-err').textContent = '';
}

async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const acc = allAccounts.find(a => a.id === pendingLogin);
  if (!acc) return;
  if (acc.password !== pw) {
    document.getElementById('pw-err').textContent = t('pwError');
    return;
  }
  currentUser = acc;
  currentTab = 'pending';
  render();
  handleDeepLink();
}

  render();

// ── TABS ───────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  ['pending','suspended','all','new','stats','registry','manual'].forEach(k => {
    const el = document.getElementById('nav-'+k);
    if (el) el.classList.toggle('active', k === tab);
    const mob = document.getElementById('mob-'+k);
    if (mob) mob.classList.toggle('active', k === tab);
  });
  const mobLogout = document.getElementById('mob-logout');
  if (mobLogout) mobLogout.classList.remove('active');
  const titles = {
    pending: currentUser.role==='sede' ? t('titlePendingSede') : t('titlePendingStore'),
    suspended: t('titleSuspended'),
    all: t('titleAll'), new: t('titleNew'), stats: t('titleStats'),
    registry: t('titleRegistry')
  };
  const titleEl = document.getElementById('page-title');
  if (titleEl) titleEl.textContent = titles[tab] || '';
  closePanel();
  loadTab(tab);
}

async function loadTab(tab) {
  const tc = document.getElementById('tab-content');
  if (!tc) return;
  if (tab === 'new' && currentUser.role === 'store') {
    uploadedFiles = [];
    tc.innerHTML = renderNewForm();
    return;
  }
  if (tab === 'stats' && isSede()) {
    tc.innerHTML = `<div class="loading">${t('loading')}</div>`;
    const data = await fetchRequests(null);
    renderStats(data);
    return;
  }
  if (tab === 'suspended' && isSede()) {
    tc.innerHTML = `<div class="loading">${t('loading')}</div>`;
    await loadNotifications();
    const data = await fetchRequests('suspended');
    renderSuspendedTab(data);
    return;
  }
  if (tab === 'registry' && isSede()) {
    tc.innerHTML = `<div class="loading">${t('loading')}</div>`;
    await renderRegistry();
    return;
  }
  if (tab === 'manual') {
    renderManualTab();
    return;
  }
  tc.innerHTML = `<div class="loading">${t('loading')}</div>`;
  await loadNotifications();
  const data = await fetchRequests(tab === 'pending' ? 'pending' : null);
  if (tab === 'pending') { renderPendingTab(data); } else { renderAllTab(data); }
}

      odour: `<h2>5j. Problemi di Odore dei Capi</h2>

    sections: {
      intro: `<h2>1. Introduction</h2>
<p><strong>Purpose of the manual:</strong> To provide guidelines on how to spot, handle, and report faulty items.</p>
<p>Boggi Milano is a synonym of quality and attention to details. We are increasingly investing to guarantee our customers a high-quality product — from the selection of fabrics and accessories to the choice of manufacturing workshops, which must undergo strict certification protocols.</p>
<p>We chose to edit this manual to provide you with objective parameters to help you in:</p>
<ul><li>Identifying the defect</li><li>Classifying it</li><li>Reporting it</li></ul>
<div class="man-box">
<strong>Manual structure:</strong>
<ul><li>Description of the defect, technical explanation and causes</li><li>Photographic examples</li><li>Repair or potential solutions</li><li>Advice, tips and response to provide to the customer</li><li>Definition and classification of the defect</li></ul>
</div>
<div class="man-classify">
  <div class="man-cls-item ff"><span class="man-cls-badge">FF</span><div><strong>Factory Defective</strong><br>Production defect found before sale</div></div>
  <div class="man-cls-item fl"><span class="man-cls-badge">FL</span><div><strong>Last Call Defective</strong><br>Not saleable in first-line stores — outlet only</div></div>
  <div class="man-cls-item fb"><span class="man-cls-badge">FB</span><div><strong>Defective to be Disposed Of</strong><br>Not saleable, to be eliminated</div></div>
</div>`,
      qc: `<h2>2. Boggi Milano Quality Control</h2>
<p>The quality control system is structured on three levels:</p>
<div class="man-steps">
  <div class="man-step"><div class="man-step-num">1</div><div><strong>Worldwide Inspectors</strong><br>Network of specialised inspectors monitoring every stage of the manufacturing process, following strict protocols.</div></div>
  <div class="man-step"><div class="man-step-num">2</div><div><strong>Collaboration with Independent Third Parties</strong><br>External companies conduct additional tests, providing an extra level of objectivity.</div></div>
  <div class="man-step"><div class="man-step-num">3</div><div><strong>Sample Control according to AQL (Acceptable Quality Level)</strong><br>Evaluates a representative percentage of items from each production batch.</div></div>
</div>
<div class="man-box man-warn">Despite all our efforts, some issues may escape the control system. For this reason, please promptly report any product-related issues in store via the <strong>Defective Product Procedure</strong>.</div>`,
      cases: `<h2>3. Case Studies</h2>

</div>
<div class="man-card">
<h3>🔸 Widespread / Systemic Case</h3>

</div>

      color: `<h2>5a. Colour Issues</h2>

      snag: `<h2>5b. Pulled Threads (Snagging)</h2>
<p>Snagging occurs when one or more threads are accidentally caught and pulled out of their original position, creating an irregularity on the surface of the garment.</p>
<div class="man-two-col">
<div><h3>Common Causes</h3><ul><li>Contact with jewellery, fingernails or rough surfaces</li><li>Excessive rubbing (bags, belts, rough seats)</li><li>Incorrect handling during transport or sale</li></ul></div>
<div><h3>Repair</h3><p>Can sometimes be repaired using a needle to reposition the thread. If beyond repair, classify accordingly.</p></div>
</div>
<h3>Classification</h3>
<div class="man-matrix"><table class="man-table"><thead><tr><th>Severity</th><th>Hidden Areas</th><th>Visible Areas</th></tr></thead><tbody>
<tr><td>Minor</td><td class="cls-ok">Not Faulty</td><td class="cls-ff">FF</td></tr>
<tr><td>Moderate</td><td class="cls-ff">FF</td><td class="cls-fl">FL</td></tr>
<tr><td>Severe</td><td class="cls-fl">FL</td><td class="cls-fb">FB</td></tr>
</tbody></table></div>

  if (!tc) return;
  const ptEl = document.getElementById('page-title');
  if (ptEl) ptEl.textContent = t('navManual');

  const md = MANUAL_DATA[manualLang] || MANUAL_DATA['en'];

  tc.innerHTML = `

      <span style="font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px">${md.langLabel}</span>
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
        <button class="man-lang-btn ${manualLang==='it'?'active':''}" onclick="switchManualLang('it')">🇮🇹 Italiano</button>

    </div>
    <nav class="man-toc">
      <div style="font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;padding:0 4px">${md.toc}</div>
      ${md.chapters.map(ch => `
        <button class="man-toc-item" id="toc-${ch.id}" onclick="showManualSection('${ch.id}')">
          <span class="man-toc-icon">${ch.icon}</span>
          <span>${ch.label}</span>
        </button>`).join('')}
    </nav>
  </div>
  <div class="man-content" id="man-content">
    <button class="man-mob-toc-btn" onclick="document.getElementById('man-sidebar').classList.toggle('man-sidebar-open')">
      ☰ ${md.toc}
    </button>
    <div id="man-section-body"></div>
  </div>
</div>`;
  showManualSection(firstChap);
}

function switchManualLang(lang) {
  manualLang = lang;
  localStorage.setItem(MANUAL_LANG_KEY, lang);
  renderManualTab();
}

function showManualSection(id) {
  const md = MANUAL_DATA[manualLang] || MANUAL_DATA['en'];
  const body = document.getElementById('man-section-body');
  const content = md.sections[id];
  if (body && content) {
    body.innerHTML = content;
    // Scroll to top
    const mc = document.getElementById('man-content');
    if (mc) mc.scrollTop = 0;
  }
  // Update active toc item
  md.chapters.forEach(ch => {
    const el = document.getElementById('toc-'+ch.id);
    if (el) el.classList.toggle('active', ch.id === id);
  });
  // Mobile: close sidebar after selection
  if (window.innerWidth <= 700) {
    const sb = document.getElementById('man-sidebar');
    if (sb) sb.classList.remove('man-sidebar-open');
  }
}

// ── SUPABASE FETCH ─────────────────────────────────────────
async function fetchRequests(statusFilter) {
  let q = sb.from('requests').select('*').order('created_at', {ascending: false});
  if (isStore()) {
    q = q.eq('store_id', currentUser.id);
  } else {
    const storeIds = allAccounts.filter(a => a.role === 'store' && userRegions().includes(a.region)).map(a => a.id);
    q = q.in('store_id', storeIds);
  }
  if (statusFilter) q = q.eq('status', statusFilter);
  const { data, error } = await q;
  if (error) { showToast(t('errLoad')+error.message); return []; }
  return data || [];
}

async function loadNotifications() {
  if (!isStore()) return;
  const { data } = await sb.from('notifications')
    .select('*').eq('store_id', currentUser.id).eq('read', false)
    .order('created_at', {ascending: false});
  const area = document.getElementById('notif-banner-area');
  if (!area) return;
  if (!data || !data.length) { area.innerHTML = ''; return; }

  const approvedKw = ['APPROVED','APPROVATA','APPROBÉ','GENEHMIGT','APROBADO','GODKÄND','JÓVÁHAGYVA','ΕΓΚΡΊΘΗΚΕ','APROVADO'];
  const rejectedKw  = ['REJECTED','NEGATA','REFUSÉ','ABGELEHNT','RECHAZADO','AVSLAGEN','ELUTASÍTVA','ΑΠΟΡΡΊΦΘΗΚΕ','REJEITADO'];
  const suspendedKw = ['SUSPENDED','SOSPESA','SUSPENDU','AUSGESETZT','SUSPENDIDO','PAUSAD','FELFÜGGESZTVE','ΑΝΕΣΤΆΛΗ','SUSPENSO'];

  const banners = data.map(n => {
    const msg = n.message || '';
    let bg='var(--amber-bg)',tx='var(--amber-tx)',br='0.5px solid var(--amber-br)';
    if (approvedKw.some(k=>msg.includes(k)))  { bg='var(--green-bg)'; tx='var(--green-tx)'; br='0.5px solid var(--green-br)'; }
    if (rejectedKw.some(k=>msg.includes(k)))  { bg='var(--red-bg)';   tx='var(--red-tx)';   br='0.5px solid var(--red-br)';   }
    if (suspendedKw.some(k=>msg.includes(k))) { bg='var(--blue-bg)';  tx='var(--blue-tx)';  br='0.5px solid var(--blue-br)';  }
    return `<div style="background:${bg};border:${br};border-radius:var(--r);padding:11px 14px;margin-bottom:6px;font-size:13px;color:${tx};line-height:1.4">${msg}</div>`;
  }).join('');

  const title = data.length === 1 ? `1 ${t('notifTitle')}` : `${data.length} ${t('notifTitlePlural')}`;
  area.innerHTML = `<div style="margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:13px;font-weight:500;color:var(--tx)">${title}</span>
      <button class="notif-close" style="color:var(--tx2);background:none;border:none;cursor:pointer;font-size:18px;padding:0 4px" onclick="dismissNotifs()">${t('notifDismiss')}</button>
    </div>
    ${banners}
  </div>`;
}

async function dismissNotifs() {
  await sb.from('notifications').update({read: true}).eq('store_id', currentUser.id).eq('read', false);
  const area = document.getElementById('notif-banner-area');
  if (area) area.innerHTML = '';
}

  const tc = document.getElementById('tab-content');
  if (!tc) return;

  if (nb) { nb.textContent = data.length; nb.style.display = data.length ? 'inline' : 'none'; }
  const mob = document.getElementById('mob-badge');
  if (mob) { mob.textContent = data.length; mob.style.display = data.length ? 'inline' : 'none'; }

  // Also update suspended badge asynchronously
  if (currentUser.role === 'sede') {
    fetchRequests('suspended').then(susp => {
      const ns = document.getElementById('nb-suspended');
      if (ns) { ns.textContent = susp.length; ns.style.display = susp.length ? 'inline' : 'none'; }
      const ms = document.getElementById('mob-susp-badge');
      if (ms) { ms.textContent = susp.length; ms.style.display = susp.length ? 'inline' : 'none'; }

  let html = '';

    html += `<div class="metrics">

    html += renderTableWrap(data, true, true);

  tc.innerHTML = html;
  renderTableRows(data, isSede());

  renderTableRows(data, true);
}

function renderAllTab(data) {

// ── TABLE WITH COLUMN FILTERS ──────────────────────────────
let tableData = [];
let tableFilters = {};
let tableSortCol = null;
let tableSortDir = 1;

function renderTableWrap(data, showStore, showFilters) {
  tableData = data;
  tableFilters = {};
  tableSortCol = null;
  tableSortDir = 1;
  if (!data.length) return `<div class="table-wrap"><div class="empty">${t('noData')}</div></div>`;

  const cols = getTableCols(showStore);
  return `<div class="table-wrap">
    <div class="table-head">
      <span style="font-weight:500;font-size:13px">${t('navAll')}</span>
      <span class="filter-count" id="filter-count">${data.length} ${t('filterRows')}</span>
      <button class="btn" style="font-size:11px;padding:4px 10px" onclick="clearAllFilters()">${t('removeFilters')}</button>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr id="th-row">${cols.map(c=>renderTh(c)).join('')}<th></th></tr>
        </thead>
        <tbody id="table-rows"></tbody>
      </table>
    </div>
  </div>`;
}

function getTableCols(showStore) {
  const base = [
    {key:'date', label:t('colDate'), type:'text'},
    ...(showStore ? [{key:'store_name', label:t('colStore'), type:'select'}] : []),
    {key:'customer_name', label:t('colCustomer'), type:'text'},
    {key:'article_code', label:t('colArticle'), type:'text'},
    {key:'damage_type', label:t('colDamage'), type:'select'},
    {key:'provenienza', label:t('colProv'), type:'select'},
    {key:'proposal', label:t('colProposal'), type:'select'},
    {key:'status', label:t('colStatus'), type:'select'},
  ];
  return base;
}

function renderTh(col) {
  const sortInd = tableSortCol === col.key ? (tableSortDir===1 ? ' ▲' : ' ▼') : '';
  return `<th style="min-width:${col.type==='text'?'110px':'120px'}">
    <div class="th-filter">
      <div class="th-label">
        <span style="cursor:pointer" onclick="sortTable('${col.key}')">${col.label}${sortInd}</span>
      </div>
      ${col.type==='text'
        ? `<input class="col-filter" id="cf-${col.key}" placeholder="${t('filterSearch')}" oninput="applyFilters()" onkeydown="if(event.key==='Escape'){this.value='';applyFilters()}">`
        : `<select class="col-filter" id="cf-${col.key}" onchange="applyFilters()">
            <option value="">${t('filterAll')}</option>
            ${getSelectOptions(col.key)}
           </select>`}
    </div>
  </th>`;
}

function getSelectOptions(key) {
  const vals = [...new Set(tableData.map(r => getRowVal(r, key)).filter(Boolean))].sort();
  return vals.map(v => `<option value="${v}">${key==='status'?statusLabel(v):v}</option>`).join('');
}

function getRowVal(r, key) {
  if (key === 'store_name') { const s = allAccounts.find(a=>a.id===r.store_id); return s?.name||r.store_id; }
  if (key === 'status') return r.status;
  return r[key] || '';
}

function applyFilters() {
  const cols = getTableCols(document.getElementById('cf-store_name') !== null);
  const filters = {};
  cols.forEach(c => {
    const el = document.getElementById('cf-'+c.key);
    if (el && el.value) { filters[c.key] = el.value.toLowerCase(); el.classList.add('filter-active'); }
    else if (el) el.classList.remove('filter-active');
  });

  let filtered = tableData.filter(r =>
    Object.entries(filters).every(([key, val]) => {
      const rv = getRowVal(r, key).toLowerCase();
      return rv.includes(val);
    })
  );

  if (tableSortCol) {
    filtered = filtered.slice().sort((a,b)=>{
      const av = getRowVal(a, tableSortCol).toLowerCase();
      const bv = getRowVal(b, tableSortCol).toLowerCase();
      return av < bv ? -tableSortDir : av > bv ? tableSortDir : 0;
    });
  }

  renderTableRows(filtered, document.getElementById('cf-store_name') !== null);
  const cnt = document.getElementById('filter-count');
  if (cnt) cnt.textContent = `${filtered.length} ${t('filterOf')} ${tableData.length} ${t('filterRows')}`;
}

function sortTable(key) {
  if (tableSortCol === key) { tableSortDir *= -1; }
  else { tableSortCol = key; tableSortDir = 1; }
  // Re-render headers with sort indicator
  const showStore = document.getElementById('cf-store_name') !== null;
  const cols = getTableCols(showStore);
  const thRow = document.getElementById('th-row');
  if (thRow) thRow.innerHTML = cols.map(c=>renderTh(c)).join('') + '<th></th>';
  // Restore filter values
  Object.entries(tableFilters).forEach(([k,v])=>{
    const el = document.getElementById('cf-'+k);
    if (el) el.value = v;
  });
  applyFilters();
}

function clearAllFilters() {
  document.querySelectorAll('.col-filter').forEach(el => { el.value = ''; el.classList.remove('filter-active'); });
  tableSortCol = null; tableSortDir = 1;
  applyFilters();
}

function renderTableRows(data, showStore) {
  const tbody = document.getElementById('table-rows');
  if (!tbody) return;
  if (!data.length) { tbody.innerHTML = `<tr><td colspan="20" class="empty">${t('noResults')}</td></tr>`; return; }
  tbody.innerHTML = data.map(r => {
    const store = allAccounts.find(a => a.id === r.store_id);
    const storeCols = showStore ? `<td title="${store?.name||r.store_id}" style="font-size:12px;max-width:130px">${store?.name||r.store_id}</td>` : '';
    return `<tr class="clickable" data-id="${r.id}" onclick="openPanel('${r.id}')">
      <td style="color:var(--tx2);font-size:12px;white-space:nowrap">${r.date||''}</td>
      ${storeCols}
      <td><div style="font-weight:500;overflow:hidden;text-overflow:ellipsis">${r.customer_name||''}</div><div style="font-size:11px;color:var(--tx2)">${r.customer_email||''}</div></td>
      <td style="font-size:12px;font-family:var(--mono)">${r.article_code||''}</td>
      <td style="font-size:12px">${r.damage_type||''}</td>
      <td style="font-size:12px">${r.provenienza||''}</td>
      <td style="font-size:12px">${r.proposal||''}</td>
      <td><span class="badge ${statusClass(r.status)}">${statusLabel(r.status)}</span></td>

    </tr>`;
  }).join('');

// ── MESSAGE THREAD ──────────────────────────────────────────
let threadUploadFiles = [];

async function loadThread(requestId) {
  const area = document.getElementById('thread-messages');
  if (!area) return;
  const { data, error } = await sb.from('messages')
    .select('*').eq('request_id', requestId)
    .order('created_at', { ascending: true });
  if (error) { area.innerHTML = `<div style="font-size:12px;color:var(--red-tx)">${t('errLoad')}${error.message}</div>`; return; }
  renderThread(data || []);
}

function renderThread(msgs) {
  const area = document.getElementById('thread-messages');
  if (!area) return;
  if (!msgs.length) {
    area.innerHTML = `<div style="font-size:12px;color:var(--tx2);padding:8px 0;text-align:center">${t('threadNoMsg')}</div>`;
    return;
  }
  area.innerHTML = msgs.map(m => {
    const isMe = m.sender_id === currentUser.id;
    const senderName = isMe ? t('threadYou') : (allAccounts.find(a=>a.id===m.sender_id)?.name || m.sender_id);
    const timeStr = new Date(m.created_at).toLocaleString(currentLang, {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    const photosHtml = (m.photo_urls && m.photo_urls.length)
      ? `<div class="msg-photos">${m.photo_urls.map(u=>`<a href="${u}" target="_blank"><img src="${u}" alt="" onerror="this.style.display='none'"></a>`).join('')}</div>`
      : '';
    return `<div style="display:flex;flex-direction:column">
      <div class="msg-bubble ${isMe?'me':'other'}">
        ${m.body ? `<div>${m.body.replace(/\n/g,'<br>')}</div>` : ''}
        ${photosHtml}
        <div class="msg-meta">${senderName} · ${timeStr}</div>
      </div>
    </div>`;
  }).join('');
  // scroll to bottom
  area.scrollTop = area.scrollHeight;
}

function previewThreadPhotos(input) {
  threadUploadFiles = Array.from(input.files).slice(0, 4);
  const preview = document.getElementById('thread-photo-preview');
  if (!preview) return;
  preview.innerHTML = threadUploadFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div class="thread-photo-thumb">
      <img src="${url}">
      <button class="rm" onclick="removeThreadPhoto(${i})">×</button>
    </div>`;
  }).join('');
}

function removeThreadPhoto(idx) {
  threadUploadFiles.splice(idx, 1);
  const dt = new DataTransfer();
  threadUploadFiles.forEach(f => dt.items.add(f));
  const inp = document.getElementById('thread-photo-input');
  if (inp) inp.files = dt.files;
  previewThreadPhotos({ files: dt.files });
}

async function sendMessage(requestId, storeId) {
  const inp = document.getElementById('thread-input');
  const body = inp?.value?.trim();
  const sendBtn = document.getElementById('thread-send-btn');

  if (!body && !threadUploadFiles.length) return;

  if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = t('threadSending'); }
  if (inp) inp.disabled = true;

  // Upload photos
  const photoUrls = [];
  for (const file of threadUploadFiles) {
    const ext = file.name.split('.').pop();
    const path = `messages/${requestId}/${genId()}.${ext}`;
    const { data: upData, error: upErr } = await sb.storage.from('fallati-photos').upload(path, file);
    if (!upErr && upData) {
      const { data: urlData } = sb.storage.from('fallati-photos').getPublicUrl(path);
      if (urlData?.publicUrl) photoUrls.push(urlData.publicUrl);
    }
  }

  const msg = {
    id: genId(),
    request_id: requestId,
    sender_id: currentUser.id,
    sender_role: currentUser.role,
    body: body || null,
    photo_urls: photoUrls,
    created_at: new Date().toISOString()
  };

  const { error } = await sb.from('messages').insert(msg);

  if (error) {
    showToast(t('errSend') + error.message);
  } else {
    // Clear input
    if (inp) { inp.value = ''; inp.style.height = 'auto'; inp.disabled = false; }
    threadUploadFiles = [];
    const preview = document.getElementById('thread-photo-preview');
    if (preview) preview.innerHTML = '';
    const photoInp = document.getElementById('thread-photo-input');
    if (photoInp) photoInp.value = '';

    // Send notification to the other party
    // If sender is store → notify sede; if sender is sede/admin → notify store
    if (isStore()) {
      // Store replied — notify sede via a generic notification marked as store-reply
      // (sede will see unread badge on the request when they open it)
      await sb.from('notifications').insert({
        id: genId(),
        store_id: storeId,   // used as reference key, sede sees all
        request_id: requestId,
        message: `💬 ${currentUser.name} (${t('roleStore')}): ${body ? body.slice(0,60) : '📎'}`,
        read: false
      });
    } else {
      // Sede/admin replied → notify the store
      await sb.from('notifications').insert({
        id: genId(),
        store_id: storeId,
        request_id: requestId,
        message: `💬 ${t('panelHqReply')}: ${body ? body.slice(0,60) : '📎'}`,
        read: false
      });
    }

    // Reload thread
    await loadThread(requestId);
  }

  if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = t('threadSend'); }
}

// ── PDF GENERATION ─────────────────────────────────────────
async function generatePDF(id) {
  // fetch fresh data if needed
  let r = window._panelRequest;
  if (!r || r.id !== id) {
    const { data, error } = await sb.from('requests').select('*').eq('id', id).single();
    if (error || !data) { showToast(t('errOpen')); return; }
    r = data;
  }
  const store = window._panelStore || allAccounts.find(a => a.id === r.store_id);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, margin = 18, colW = (W - margin*2) / 2;

  // ── Colors ──
  const BLACK = [26, 26, 24];
  const GRAY  = [107, 107, 103];
  const LIGHT = [238, 237, 233];
  const WHITE = [255, 255, 255];

  // ── Header band ──
  doc.setFillColor(...BLACK);
  doc.rect(0, 0, W, 32, 'F');

  // Logo text (Boggi Milano)
  doc.setTextColor(...WHITE);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text('BOGGI MILANO', W/2, 13, { align: 'center' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(200, 200, 196);
  doc.text(t('pdfSubtitle').replace('Boggi Milano – ', '').toUpperCase(), W/2, 20, { align: 'center' });

  // Status badge
  const statusColors = {
    pending:  [186, 117, 23],
    approved: [59, 109, 17],
    rejected: [163, 45, 45],
    suspended:[12, 68, 124],
  };
  const sc = statusColors[r.status] || BLACK;
  doc.setFillColor(...sc);
  doc.roundedRect(W/2 - 22, 23, 44, 7, 2, 2, 'F');
  doc.setTextColor(...WHITE);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7);
  doc.text(statusLabel(r.status).toUpperCase(), W/2, 27.8, { align: 'center' });

  // ── Request ID + date ──
  let y = 42;
  doc.setTextColor(...GRAY);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.text(`${t('pdfGenerated')} ${r.date}  ·  ID: ${r.id.slice(0,8).toUpperCase()}`, margin, y);
  y += 8;

  // ── Section renderer ──
  function sectionTitle(label, yPos) {
    doc.setFillColor(...LIGHT);
    doc.rect(margin, yPos, W - margin*2, 6, 'F');
    doc.setTextColor(...BLACK);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7);
    doc.text(label.toUpperCase(), margin + 3, yPos + 4.2);
    return yPos + 10;
  }

  function field(label, value, x, yPos, w) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(...GRAY);
    doc.text(label.toUpperCase(), x, yPos);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(...BLACK);
    const val = String(value || '—');
    const lines = doc.splitTextToSize(val, w - 4);
    doc.text(lines, x, yPos + 4.5);
    return yPos + 5 + lines.length * 4;
  }

  function fieldRow(pairs, yPos) {
    let maxY = yPos;
    pairs.forEach(([label, value, col]) => {
      const x = margin + col * colW;
      const ny = field(label, value, x, yPos, colW);
      if (ny > maxY) maxY = ny;
    });
    return maxY + 3;
  }

  // ── Article info ──
  y = sectionTitle(t('fArticleLabel'), y);
  y = fieldRow([
    [t('fArticleLabel'), r.article_code, 0],
    [t('fSizeLabel'), r.size, 1],
  ], y);
  y = fieldRow([
    [t('fDamageLabel'), r.damage_type, 0],
    [t('fProposalLabel'), r.proposal, 1],
  ], y);
  y = fieldRow([
    [t('fUsedLabel'), r.used === 'SI' ? t('usedYes') : r.used === 'NO' ? t('usedNo') : '—', 0],
    [t('fWearLabel'), r.wear ? r.wear+'/5' : '—', 1],
  ], y);
  if (r.note) {
    y = field(t('fNoteLabel'), r.note, margin, y, W - margin*2);
    y += 3;
  }

  // ── Store & dates ──
  y += 2;
  y = sectionTitle(t('fStore'), y);
  y = fieldRow([
    [t('fStore'), store?.name || r.store_id, 0],
    [t('fProv2'), r.provenienza, 1],
  ], y);
  y = fieldRow([
    [t('fPurchLabel'), r.purchase_date || '—', 0],
    [t('fDropLabel'), r.dropoff_date || '—', 1],
  ], y);

  // ── Customer (only if Cliente) ──
  if (r.provenienza === t('prov_customer') || r.customer_name !== '—') {
    y += 2;
    y = sectionTitle(t('fCust'), y);
    y = fieldRow([
      [t('fCust'), r.customer_name, 0],
      [t('fCardLabel'), r.card || '—', 1],
    ], y);
    y = fieldRow([
      [t('fCustEmail'), r.customer_email || '—', 0],
      [t('fPurchLabel'), r.purchase_date || '—', 1],
    ], y);
  }

  // ── Emails section ──
  if (r.email_cliente || r.email_negozio) {
    y += 2;
    y = sectionTitle(t('pdfEmails'), y);
    if (r.email_cliente && r.email_negozio) {
      y = fieldRow([
        [t('pdfEmailCustomer'), r.email_cliente, 0],
        [t('pdfEmailStore'), r.email_negozio, 1],
      ], y);
    } else {
      if (r.email_cliente) y = field(t('pdfEmailCustomer'), r.email_cliente, margin, y, W - margin*2);
      if (r.email_negozio) y = field(t('pdfEmailStore'), r.email_negozio, margin, y, W - margin*2);
      y += 3;
    }
  }

  // ── Approval note ──
  if (r.approval_note) {
    y += 2;
    y = sectionTitle(t('panelHqReply'), y);
    y = field(r.decided_by || t('roleSede'), r.approval_note, margin, y, W - margin*2);
    y += 3;
  }

  // ── Photos section ──
  y += 2;
  y = sectionTitle(t('panelPhotos'), y);
  if (r.photo_urls && r.photo_urls.length) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(...GRAY);
    doc.text(t('pdfPhotosNote'), margin, y);
    y += 5;
    // Try to embed up to 3 photos
    let photoX = margin;
    const photoSize = 45;
    const photoGap = 6;
    const loadImg = (url) => new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = () => resolve(null);
      img.src = url;
    });

    const photosToShow = r.photo_urls.slice(0, 4);
    const dataUrls = await Promise.all(photosToShow.map(loadImg));
    let addedPhotos = 0;
    for (const dataUrl of dataUrls) {
      if (dataUrl) {
        if (y + photoSize > 280) { doc.addPage(); y = 20; photoX = margin; }
        doc.addImage(dataUrl, 'JPEG', photoX, y, photoSize, photoSize);
        photoX += photoSize + photoGap;
        addedPhotos++;
        if (photoX + photoSize > W - margin) { photoX = margin; y += photoSize + photoGap; }
      }
    }
    if (addedPhotos > 0) y += photoSize + photoGap;
    if (r.photo_urls.length > 4) {
      doc.setFontSize(7); doc.setTextColor(...GRAY);
      doc.text(`+ ${r.photo_urls.length - 4} altre foto nel sistema`, margin, y);
      y += 5;
    }
  } else {
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...GRAY);
    doc.text(t('pdfNoPhotos'), margin, y); y += 6;
  }

  // ── Footer ──
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFillColor(...LIGHT);
    doc.rect(0, 287, W, 10, 'F');
    doc.setTextColor(...GRAY); doc.setFont('helvetica','normal'); doc.setFontSize(7);
    doc.text('Boggi Milano — Gestione Fallati', margin, 293);
    doc.text(`${i} / ${pageCount}`, W - margin, 293, { align: 'right' });
  }

  const fname = `fallato_${r.article_code}_${r.id.slice(0,6)}.pdf`;
  doc.save(fname);
  showToast(`PDF salvato: ${fname}`);
}

async function decide(requestId, storeId, status) {
  const note = document.getElementById('resp-note')?.value || '';
  const btn = event.target;
  btn.disabled = true;

  const { error } = await sb.from('requests').update({
    status, approval_note: note, decided_by: currentUser.name, decided_at: new Date().toISOString()
  }).eq('id', requestId);

  if (error) { showToast(t('errDecide')+error.message); btn.disabled = false; return; }

  // Create store notification
  const labels = {approved:t('statusApproved').toUpperCase(),rejected:t('statusRejected').toUpperCase(),suspended:t('statusSuspended').toUpperCase()};
  const { data: req } = await sb.from('requests').select('article_code,damage_type').eq('id', requestId).single();
  const msg = `Richiesta ${req?.article_code||''} (${req?.damage_type||''}) — ${labels[status]}${note ? ' · '+note : ''}`;
  await sb.from('notifications').insert({id: genId(), store_id: storeId, request_id: requestId, message: msg});

  closePanel();
  showToast(`${statusLabel(status)} ${t('toastNotified')}`);
  loadTab('pending');
}

async function submitRequest() {
  showFormErr('');
  const prov = document.getElementById('f-prov')?.value;
  const isCliente = prov === 'Cliente';
  const article = document.getElementById('f-article')?.value?.trim();
  const size = document.getElementById('f-size')?.value?.trim();
  const ddate = document.getElementById('f-ddate')?.value;
  const wear = document.getElementById('f-wear')?.value;
  const damage = document.getElementById('f-damage')?.value;
  const proposal = document.getElementById('f-proposal')?.value;
  const name = document.getElementById('f-name')?.value?.trim();
  const pdate = document.getElementById('f-pdate')?.value;

  // Campi sempre obbligatori
  if (!prov) return showFormErr(t('errProv'));
  if (!ddate) return showFormErr(t('errDropoff'));
  if (!wear) return showFormErr(t('errWear'));
  if (!article) return showFormErr(t('errArticle'));
  if (article.length !== 11) return showFormErr(t('errArticleLen'));
  if (!size) return showFormErr(t('errSize'));
  if (!damage) return showFormErr(t('errDamage'));
  if (!proposal) return showFormErr(t('errProposal'));
  if (!uploadedFiles.length) return showFormErr(t('errPhoto'));

  // Campi obbligatori solo per Cliente
  if (isCliente) {
    if (!name) return showFormErr(t('errName'));
    if (!pdate) return showFormErr(t('errPurchDate'));
    // La data di consegna non può essere antecedente alla data di acquisto
    if (ddate && pdate && ddate < pdate) return showFormErr(t('errDateOrder'));
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = t('fSending');

  // Upload foto
  const photoUrls = [];
  for (const file of uploadedFiles) {
    const ext = file.name.split('.').pop();
    const path = `${currentUser.id}/${genId()}.${ext}`;
    const { data: upData, error: upErr } = await sb.storage.from('fallati-photos').upload(path, file);
    if (!upErr && upData) {
      const { data: urlData } = sb.storage.from('fallati-photos').getPublicUrl(path);
      if (urlData?.publicUrl) photoUrls.push(urlData.publicUrl);
    }
  }

  const req = {
    id: genId(),
    store_id: currentUser.id,
    date: today(),
    provenienza: prov,
    store_purchase: document.getElementById('f-storepurch').value,
    customer_name: name || '—',
    customer_email: document.getElementById('f-email').value,
    email_cliente: isCliente ? (document.getElementById('f-email-cliente')?.value || '') : '',
    email_negozio: isCliente ? (document.getElementById('f-email-negozio')?.value || '') : '',
    card: document.getElementById('f-card').value,
    purchase_date: pdate || null,
    dropoff_date: ddate,
    used: document.getElementById('f-used').value,
    wear,
    article_code: article,
    size,
    damage_type: damage,
    proposal,
    note: document.getElementById('f-note').value,
    photo_urls: photoUrls,
    status: 'pending'
  };

  const { error } = await sb.from('requests').insert(req);
  if (error) {
    showFormErr(t('errSend')+error.message);
    btn.disabled = false; btn.textContent = t('fSubmit');
    return;
  }

  showToast(t('toastSent'));
  setTab('pending');
}

// ── STATISTICS ─────────────────────────────────────────────
function countBy(arr, key) {
  return arr.reduce((acc, r) => {
    const k = r[key] || 'N/D';
    acc[k] = (acc[k] || 0) + 1;
    return acc;
  }, {});
}
function topN(obj, n) {
  return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n);
}
function pct(n, total) { return total ? Math.round(n/total*100) : 0; }

function barChart(entries, total, color) {
  if (!entries.length) return `<div style="font-size:12px;color:var(--tx2)">${t('statNoData')}</div>`;
  const max = entries[0][1];
  return entries.map(([label, val]) => `
    <div class="bar-row">
      <div class="bar-label" title="${label}">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/max*100)}%;background:${color}"></div></div>
      <div class="bar-val">${val}${total ? ' ('+pct(val,total)+'%)' : ''}</div>
    </div>`).join('');
}

function donutSvg(segments, size=80) {
  const total = segments.reduce((s,x)=>s+x.val,0);
  if (!total) return '';
  const r = 28, cx = size/2, cy = size/2, stroke = 14;
  let offset = 0;
  const circ = 2 * Math.PI * r;
  const paths = segments.map(s => {
    const dash = (s.val/total)*circ;
    const gap = circ - dash;
    const el = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}" stroke-dashoffset="${(-offset).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += dash;
    return el;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`;
}

function renderStats(data) {
  const tc = document.getElementById('tab-content');
  if (!tc) return;
  const total = data.length;
  if (!total) { tc.innerHTML = `<div class="empty">${t('statNoStats')}</div>`; return; }

  const approved = data.filter(r=>r.status==='approved').length;
  const rejected = data.filter(r=>r.status==='rejected').length;
  const suspended = data.filter(r=>r.status==='suspended').length;
  const pending = data.filter(r=>r.status==='pending').length;
  const decided = approved + rejected + suspended;
  const approvalRate = pct(approved, decided);
  const rejectionRate = pct(rejected, decided);

  // Avg response time
  const decided_reqs = data.filter(r=>r.decided_at && r.created_at);
  const avgDays = decided_reqs.length
    ? (decided_reqs.reduce((s,r)=>s+(new Date(r.decided_at)-new Date(r.created_at)),0) / decided_reqs.length / 86400000).toFixed(1)
    : '—';

  // Conteggi per dimensioni
  const byStore = countBy(data, 'store_id');
  const byStoreNamed = Object.fromEntries(Object.entries(byStore).map(([id,v])=>[allAccounts.find(a=>a.id===id)?.name||id, v]));
  const byDamage = countBy(data, 'damage_type');
  const byProposal = countBy(data, 'proposal');
  const byProvenienza = countBy(data, 'provenienza');
  const byUsura = countBy(data, 'wear');
  const byArticle = countBy(data, 'article_code');
  const byMonth = countBy(data.map(r=>({month: r.date ? r.date.slice(-7) : 'N/D'})), 'month');

  // Negozio con tasso approvazione più alto
  const storeStats = {};
  allAccounts.filter(a=>a.role==='store'&&userRegions().includes(a.region)).forEach(s=>{
    const sr = data.filter(r=>r.store_id===s.id);
    const sdec = sr.filter(r=>r.status!=='pending');
    storeStats[s.name] = {
      total: sr.length,
      approved: sr.filter(r=>r.status==='approved').length,
      rate: sdec.length ? pct(sr.filter(r=>r.status==='approved').length, sdec.length) : null
    };
  });

  const statusColors = {'approved':'#3B6D11','rejected':'#A32D2D','pending':'#854F0B','suspended':'#0C447C'};
  const donutSegs = [
    {val:approved, color:'#3B6D11', label:t('statApproved')},
    {val:rejected, color:'#A32D2D', label:t('statRejected')},
    {val:suspended, color:'#0C447C', label:t('statSuspended')},
    {val:pending, color:'#BA7517', label:t('statPending')},
  ].filter(s=>s.val>0);

  tc.innerHTML = `
  <div class="kpi-row">
    <div class="kpi-card"><div class="kpi-label">${t('statTotal')}</div><div class="kpi-value">${total}</div></div>
    <div class="kpi-card"><div class="kpi-label">${t('statPending')}</div><div class="kpi-value" style="color:var(--amber-tx)">${pending}</div></div>
    <div class="kpi-card"><div class="kpi-label">${t('statApprRate')}</div><div class="kpi-value" style="color:var(--green-tx)">${approvalRate}%</div><div class="kpi-sub">${t('statOn')} ${decided} ${t('statValutated')}</div></div>
    <div class="kpi-card"><div class="kpi-label">${t('statRejRate')}</div><div class="kpi-value" style="color:var(--red-tx)">${rejectionRate}%</div><div class="kpi-sub">su ${decided} valutate</div></div>
    <div class="kpi-card"><div class="kpi-label">${t('statApproved')}</div><div class="kpi-value" style="color:var(--green-tx)">${approved}</div></div>
    <div class="kpi-card"><div class="kpi-label">${t('statRejected')}</div><div class="kpi-value" style="color:var(--red-tx)">${rejected}</div></div>
    <div class="kpi-card"><div class="kpi-label">${t('statSuspended')}</div><div class="kpi-value" style="color:var(--blue-tx)">${suspended}</div></div>
    <div class="kpi-card"><div class="kpi-label">${t('statAvgDays')}</div><div class="kpi-value">${avgDays}</div><div class="kpi-sub">${t('statDays')}</div></div>
  </div>

  <div class="stats-2col">
    <div class="stat-card">
      <div class="stat-card-title">${t('statDistrib')}</div>
      <div class="donut-wrap">
        ${donutSvg(donutSegs, 90)}
        <div class="donut-legend">
          ${donutSegs.map(s=>`<div class="legend-row"><div class="legend-dot" style="background:${s.color}"></div><span>${s.label}</span><span style="margin-left:auto;font-weight:500">${pct(s.val,total)}%</span></div>`).join('')}
        </div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-card-title">${t('statByProv')}</div>
      ${barChart(topN(byProvenienza,6), total, '#378ADD')}
    </div>
  </div>

  <div class="stats-2col">
    <div class="stat-card">
      <div class="stat-card-title">${t('statTopStores')}</div>
      ${barChart(topN(byStoreNamed,8), total, '#1D9E75')}
    </div>
    <div class="stat-card">
      <div class="stat-card-title">${t('statStoreRate')}</div>
      ${Object.entries(storeStats).filter(([,v])=>v.total>0).sort((a,b)=>(b[1].rate||0)-(a[1].rate||0)).map(([name,v])=>`
        <div class="bar-row">
          <div class="bar-label" title="${name}">${name}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${v.rate||0}%;background:#3B6D11"></div></div>
          <div class="bar-val">${v.rate!==null?v.rate+'%':'—'} <span style="color:var(--tx2)">(${v.total})</span></div>
        </div>`).join('')}
    </div>
  </div>

  <div class="stats-2col">
    <div class="stat-card">
      <div class="stat-card-title">${t('statDamages')}</div>
      ${barChart(topN(byDamage,8), total, '#D85A30')}
    </div>
    <div class="stat-card">
      <div class="stat-card-title">${t('statProposal')}</div>
      ${barChart(topN(byProposal,5), total, '#7F77DD')}
      <div style="margin-top:14px">
        <div class="stat-card-title" style="margin-bottom:8px">${t('statWear')}</div>
        ${barChart(Object.entries(byUsura).sort((a,b)=>a[0]-b[0]), total, '#888780')}
      </div>
    </div>
  </div>

  <div class="stats-2col">
    <div class="stat-card">
      <div class="stat-card-title">${t('statArticles')}</div>
      ${barChart(topN(byArticle,8), null, '#BA7517')}
    </div>
    <div class="stat-card">
      <div class="stat-card-title">${t('statByMonth')}</div>
      ${barChart(Object.entries(byMonth).sort((a,b)=>a[0]>b[0]?1:-1).slice(-12), null, '#185FA5')}
    </div>
  </div>`;
}
